    <style>
        body {
            background-color: #0a0a0a; /* Deep black */
            /* Added a subtle radial gradient for depth */
            background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #0a0a0a 70%);
            background-attachment: fixed;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0a0a0a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #333; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }

        /* --- Custom Animations --- */
        
        /* Entrance Fade Up Animation */
        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        
        .animate-fade-up {
            animation: fadeUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }
        
        /* Staggered Delays for elements */
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        .delay-400 { animation-delay: 400ms; }
        .delay-500 { animation-delay: 500ms; }

        /* Advanced Button Hover Effects */
        .btn-animated {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            background-color: #0f0f0f;
        }
        
        /* Subtle light sweep effect on hover */
        .btn-animated::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.04), transparent);
            transition: all 0.6s ease;
        }

        .btn-animated:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px -10px rgba(255, 255, 255, 0.15);
            border-color: #4b5563; /* gray-600 equivalent */
            background-color: #1a1a1a;
        }

        .btn-animated:hover::before {
            left: 100%;
        }
    </style>
</head>
