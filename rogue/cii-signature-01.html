<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Import brand fonts for clients that support them (Apple Mail, iOS) -->
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&display=swap');
        
        @font-face {
            font-family: 'Unison';
            src: url('https://gochred.github.io/rogue/Unison-Pro-Bold.otf') format('opentype');
            font-weight: bold;
            font-style: normal;
        }
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f5;">

    <!-- Wrapper Table (Ensures max width and background) -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 727px; margin: 0 auto; background-color: #ffffff; background-image: url('https://gochred.github.io/rogue/img/email-bg.jpg'); background-position: bottom right; background-repeat: no-repeat; border: 1px solid #e5e7eb;">
        <tr>
            <td style="padding: 40px 30px;">

                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <!-- Left Column: Details -->
                        <td width="45%" valign="top" style="padding-right: 20px;">
                            <h1 style="margin: 0 0 6px 0; font-family: 'Unison', 'Arial Black', Impact, sans-serif; font-size: 20px; color: #111827; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2;">
                                Firstname Lastname
                            </h1>
                            <p style="margin: 0 0 12px 0; font-family: 'Manrope', Arial, sans-serif; font-size: 12px; color: #C9002B; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;">
                                Job Title
                            </p>
                            
                            <p style="margin: 0 0 12px 0; font-family: 'Manrope', Arial, sans-serif; font-size: 13px; color: #111827; font-weight: 600;">
                                Cemar International Industrial LLC.
                            </p>
                            
                            <table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Manrope', Arial, sans-serif; font-size: 11px; color: #4b5563;">
                                <tr>
                                    <td style="padding-bottom: 4px;"><strong style="color: #C9002B;">TEL:</strong></td>
                                    <td style="padding-bottom: 4px; padding-left: 8px;">+971 4 8839 798</td>
                                </tr>
                                <tr>
                                    <td><strong style="color: #C9002B;">EML:</strong></td>
                                    <td style="padding-left: 8px;">
                                        <a href="mailto:firstname@cemar-international.com" style="color: #4b5563; text-decoration: none;">firstname@cemar-international.com</a>
                                    </td>
                                </tr>
                            </table>
                        </td>

                        <!-- Right Column: Socials & Partner Logos (Blue Box Area) -->
                        <td width="55%" valign="top" align="right">
                            
                            <!-- Socials -->
                            <table cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td align="right">
                                        <table cellpadding="0" cellspacing="0" border="0">
                                            <tr>
                                                <td style="padding: 0 4px;"><a href="https://www.youtube.com/@Cemar_International"><img src="https://img.icons8.com/ios-filled/24/C9002B/youtube-play.png" width="24" height="24" alt="YouTube" style="display: block; border: none;"></a></td>
                                                <td style="padding: 0 4px;"><a href="https://www.linkedin.com/company/cemar-international/"><img src="https://img.icons8.com/ios-filled/24/C9002B/linkedin.png" width="24" height="24" alt="LinkedIn" style="display: block; border: none;"></a></td>
                                                <td style="padding: 0 4px;"><a href="https://www.facebook.com/watch/61568210845592/"><img src="https://img.icons8.com/ios-filled/24/C9002B/facebook-new.png" width="24" height="24" alt="Facebook" style="display: block; border: none;"></a></td>
                                                <td style="padding: 0 4px;"><a href="https://www.instagram.com/cemar_international/"><img src="https://img.icons8.com/ios-filled/24/C9002B/instagram-new.png" width="24" height="24" alt="Instagram" style="display: block; border: none;"></a></td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                            <!-- Group Companies -->
                            <table cellpadding="0" cellspacing="0" border="0" width="100%" style="margin-top: 15px;">
                                <tr>
                                    <td align="right">
                                        <h3 style="margin: 0 0 10px 0; font-family: 'Unison', 'Arial Black', Impact, sans-serif; font-size: 11px; color: #111827; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2; text-align: right;">
                                            CEMAR GROUP COMPANIES:
                                        </h3>
                                    </td>
                                </tr>
                                <tr>
                                    <td align="right">
                                        <table cellpadding="0" cellspacing="0" border="0" align="right">
                                            <tr>
                                                <td align="right" valign="middle"><img src="https://gochred.github.io/rogue/img/arcem.png" width="60" alt="ARCEM" style="display: block; max-width: 100%;"></td>
                                                <td align="right" valign="middle" style="padding-left: 20px;"><img src="https://gochred.github.io/rogue/img/cad.png" width="60" alt="CAD" style="display: block; max-width: 100%;"></td>
                                                <td align="right" valign="middle" style="padding-left: 20px;"><img src="https://gochred.github.io/rogue/img/cii.png" width="88" alt="CII" style="display: block; max-width: 100%;"></td>
                                                <td align="right" valign="middle" style="padding-left: 20px;"><img src="https://gochred.github.io/rogue/img/cie.png" width="60" alt="CIE" style="display: block; max-width: 100%;"></td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>

                        </td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

    <!-- EVENT CTA SEPARATE TABLE (IMAGE ONLY) -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 727px; margin: 0 auto; background-color: #ffffff; border: 1px solid #e5e7eb; border-top: none;">
        <tr>
            <td style="padding: 0; line-height: 0; font-size: 0;">
                <a href="https://www.eurosatory.com/" target="_blank" style="display: block;">
                    <img src="https://gochred.github.io/rogue/img/eurosat.png" alt="Meet us at Eurosatory 2026" width="727" style="display: block; width: 100%; max-width: 727px; height: auto; border: none; outline: none;">
                </a>
            </td>
        </tr>
    </table>

</body>
</html>
