<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Import brand fonts for clients that support them (Apple Mail, iOS) -->
    <style type="text/css">
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Michroma&display=swap');
    </style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f5;">

    <!-- Wrapper Table (Ensures max width and background) -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 650px; margin: 0 auto; background-color: #ffffff; background-image: url('img/sig-bg.png'); background-position: bottom right; background-repeat: no-repeat; border: 1px solid #e5e7eb;">
        <tr>
            <td style="padding: 40px 30px;">
                
                <!-- TOP SECTION: Info & Socials -->
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <!-- Top Left: Details -->
                        <td width="65%" valign="top" style="padding-right: 20px;">
                            <h1 style="margin: 0 0 6px 0; font-family: 'Michroma', sans-serif; font-size: 20px; color: #111827; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2;">
                                Firstname Lastname
                            </h1>
                            <p style="margin: 0 0 12px 0; font-family: 'Manrope', sans-serif; font-size: 12px; color: #d32f2f; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;">
                                Job Title
                            </p>
                            
                            <p style="margin: 0 0 12px 0; font-family: 'Manrope', sans-serif; font-size: 13px; color: #111827; font-weight: 600;">
                                Cemar International Industrial LLC.
                            </p>
                            
                            <table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Manrope', sans-serif; font-size: 11px; color: #4b5563;">
                                <tr>
                                    <td style="padding-bottom: 4px;"><strong style="color: #d32f2f;">TEL:</strong></td>
                                    <td style="padding-bottom: 4px; padding-left: 8px;">+971 4 8839 798</td>
                                </tr>
                                <tr>
                                    <td><strong style="color: #d32f2f;">EML:</strong></td>
                                    <td style="padding-left: 8px;">
                                        <a href="mailto:firstname@cemar-international.com" style="color: #4b5563; text-decoration: none;">firstname@cemar-international.com</a>
                                    </td>
                                </tr>
                            </table>
                        </td>

                        <!-- Top Right: Socials -->
                        <td width="35%" valign="top" align="right">
                            <table cellpadding="0" cellspacing="0" border="0">
                                <tr>
                                    <!-- Replace the hashes with actual links -->
                                    <td style="padding: 0 4px;"><a href="#"><img src="https://img.icons8.com/ios-filled/24/d32f2f/youtube-play.png" width="24" height="24" alt="YouTube" style="display: block; border: none;"></a></td>
                                    <td style="padding: 0 4px;"><a href="#"><img src="https://img.icons8.com/ios-filled/24/d32f2f/linkedin.png" width="24" height="24" alt="LinkedIn" style="display: block; border: none;"></a></td>
                                    <td style="padding: 0 4px;"><a href="#"><img src="https://img.icons8.com/ios-filled/24/d32f2f/twitterx--v1.png" width="24" height="24" alt="Twitter" style="display: block; border: none;"></a></td>
                                    <td style="padding: 0 4px;"><a href="#"><img src="https://img.icons8.com/ios-filled/24/d32f2f/facebook-new.png" width="24" height="24" alt="Facebook" style="display: block; border: none;"></a></td>
                                    <td style="padding: 0 4px;"><a href="#"><img src="https://img.icons8.com/ios-filled/24/d32f2f/instagram-new.png" width="24" height="24" alt="Instagram" style="display: block; border: none;"></a></td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                </table>

                <!-- Tactical Divider -->
                <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin: 25px 0;">
                    <tr>
                        <td width="10" style="border-top: 2px solid #d32f2f;"></td>
                        <td style="border-top: 1px solid #e5e7eb;"></td>
                    </tr>
                </table>

                <!-- BOTTOM SECTION: 5 Logos -->
                <h3 style="margin: 0 0 15px 0; font-family: 'Michroma', sans-serif; font-size: 14px; color: #111827; text-transform: uppercase; letter-spacing: 1px; line-height: 1.2;">
                    CEMAR GROUP COMPANIES:
                </h3>
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td align="center" width="20%"><img src="img/arcem.png" width="70" alt="Partner Logo 1" style="display: block; max-width: 100%;"></td>
                        <td align="center" width="20%"><img src="img/cad.png" width="70" alt="Partner Logo 2" style="display: block; max-width: 100%;"></td>
                        <td align="center" width="20%"><img src="img/cii.png" width="100" alt="Partner Logo 3" style="display: block; max-width: 100%;"></td>
                        <td align="center" width="20%"><img src="img/cie.png" width="70" alt="Partner Logo 4" style="display: block; max-width: 100%;"></td>
                        <td align="center" width="20%"><img src="img/fam.png" width="70" alt="Partner Logo 5" style="display: block; max-width: 100%;"></td>
                    </tr>
                </table>

            </td>
        </tr>
    </table>

    <!-- EVENT CTA SEPARATE TABLE -->
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="max-width: 650px; margin: 0 auto; background-color: #0033a0; background-image: url('img/sig-bg-3.png'); background-size: cover; background-position: center; border: 1px solid #002266; border-top: none;">
        <tr>
          
            <td style="padding: 20px 30px;">
                <table width="100%" cellpadding="0" cellspacing="0" border="0">
                    <tr>
                        <td width="20%" align="left" valign="middle">
                            <!-- Eurosatory Logo Placeholder -->
                            <img src="img/idex.png" height="80" alt="Idex Logo" style="display: block; max-height: 40px;">
                        </td>
                        <td width="80%" align="right" valign="middle">
        
                            <a href="http://www.idexuae.ae/" style="background-color: #ffffff; border: 1px solid #d32f2f; color: #d32f2f; display: inline-block; font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: bold; line-height: 36px; text-align: center; text-decoration: none; width: 100%; max-width: 420px; -webkit-text-size-adjust: none; mso-hide: all; letter-spacing: 0.5px;">
                                >> MEET US AT IDEX 2027 | CLICK HERE TO FIND OUT MORE
                            </a>
                        </td>
                    </tr>
                </table>
            </td>
            <!--[if gte mso 9]>
            </v:textbox>
            </v:rect>
            </td>
            <![endif]-->
        </tr>
    </table>

</body>
</html>
