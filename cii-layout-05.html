<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CEMAR International — Ballistic Protection Solutions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

  <style>
    /* ===========================
       CSS VARIABLES & FONTS
    =========================== */
    @font-face {
        font-family: 'Unison';
        src: url('https://gochred.github.io/Unison-Pro-Bold.otf') format('opentype');
        font-weight: bold;
        font-style: normal;
    }

    :root {
      --blue:       #004893; /* Updated to brand guideline */
      --blue-dark:  #003670;
      --blue-light: #1A6BB5;
      --red:        #C9002B; /* Updated to brand guideline */
      --red-dark:   #9E0022;
      --black:      #000000;
      --grey-deep:  #0D0D0D;
      --grey-dark:  #1A1A1A;
      --grey-mid:   #3A3A3A;
      --grey-light: #7A7A7A;
      --grey-pale:  #D0D0D0;
      --white:      #F6F7F9;
      --off-white:  #EDEEF1;
      --bg:         #F0F2F5;
      --surface:    #FFFFFF;
      --border:     rgba(0,0,0,0.07);
      --border-strong: rgba(0,0,0,0.14);
      --mono:       'Share Tech Mono', monospace;
      --display:    'Unison', sans-serif; /* Updated to Unison */
      --body:       'Manrope', sans-serif;
    }

    /* ===========================
       RESET & BASE
    =========================== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; font-size: 16px; }

    body {
      font-family: var(--body);
      background: var(--bg);
      color: var(--black);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--blue); color: #fff; }

    a { color: inherit; text-decoration: none; }

    img { display: block; max-width: 100%; }

    /* ===========================
       UTILITY
    =========================== */
    .container {
      max-width: 1320px;
      margin: 0 auto;
      padding: 0 40px;
    }

    .mono { font-family: var(--mono); }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-light);
      padding: 4px 10px;
      border: 1px solid var(--border-strong);
      background: rgba(255,255,255,0.6);
    }

    .tag::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse-dot 2s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* ===========================
       NAVIGATION
    =========================== */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: rgba(240,240,242,0.92);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border-strong);
      transition: all 0.3s ease;
    }

    .nav.scrolled {
      background: rgba(240,240,242,0.98);
      box-shadow: 0 4px 40px rgba(0,0,0,0.08);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-logo-mark {
      width: 36px;
      height: 36px;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
    }

    .nav-logo-mark::after {
      content: '';
      position: absolute;
      inset: 3px;
      background: var(--blue);
      clip-path: polygon(0 0, 100% 0, 100% 82%, 82% 100%, 0 100%);
    }

    .nav-logo-text {
      display: flex;
      flex-direction: column;
    }

    .nav-logo-name {
      font-family: var(--display);
      font-size: 20px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      line-height: 1;
      color: var(--black);
    }

    .nav-logo-sub {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 36px;
      list-style: none;
    }

    .nav-links a {
      font-family: var(--body);
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--grey-mid);
      position: relative;
      transition: color 0.2s;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--blue);
      transition: width 0.25s ease;
    }

    .nav-links a:hover { color: var(--black); }
    .nav-links a:hover::after { width: 100%; }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-cert {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--grey-light);
      padding: 5px 10px;
      border: 1px solid var(--border-strong);
    }

    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--blue);
      color: #fff;
      font-family: var(--body);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px 24px;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, 100% 0, 100% 75%, 92% 100%, 0 100%);
      transition: background 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.12);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
    }

    .btn-primary:hover::before { transform: translateX(0); }
    .btn-primary:hover { background: var(--blue-dark); }
    .btn-primary:active { transform: scale(0.98); }

    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: transparent;
      color: var(--black);
      font-family: var(--body);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 11px 24px;
      border: 1.5px solid var(--grey-mid);
      cursor: pointer;
      transition: all 0.2s;
      clip-path: polygon(0 0, 100% 0, 100% 75%, 92% 100%, 0 100%);
    }

    .btn-ghost:hover {
      border-color: var(--black);
      background: var(--black);
      color: #fff;
    }

    .btn-arrow {
      font-size: 16px;
      transition: transform 0.2s;
    }

    .btn-primary:hover .btn-arrow,
    .btn-ghost:hover .btn-arrow { transform: translateX(4px); }

    /* ===========================
       HERO
    =========================== */
    .hero {
      min-height: 100vh;
      padding-top: 68px;
      position: relative;
      display: flex;
      align-items: center;
      background: var(--white);
      overflow: hidden;
    }

    /* Tactical grid background */
    .hero-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* Red accent geometry */
    .hero-geometry {
      position: absolute;
      top: 0;
      right: 0;
      width: 52%;
      height: 100%;
      background: var(--off-white);
      clip-path: polygon(12% 0, 100% 0, 100% 100%, 0% 100%);
      overflow: hidden;
    }

    .hero-geometry-inner {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    /* Diagonal red stripe */
    .hero-stripe {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 0;
      width: 5px;
      background: var(--red);
    }

    .hero-stripe-right {
      position: absolute;
      top: 60px;
      right: 60px;
      width: 3px;
      height: 140px;
      background: var(--red);
      opacity: 0.4;
    }

    /* Corner reticle */
    .reticle {
      position: absolute;
      width: 60px;
      height: 60px;
      pointer-events: none;
    }

    .reticle::before, .reticle::after {
      content: '';
      position: absolute;
      background: var(--blue);
    }

    .reticle-tl { top: 80px; right: 80px; }
    .reticle-tl::before { top: 0; left: 0; width: 2px; height: 24px; }
    .reticle-tl::after  { top: 0; left: 0; width: 24px; height: 2px; }

    .reticle-br { bottom: 80px; right: 160px; opacity: 0.3; }
    .reticle-br::before { bottom: 0; right: 0; width: 2px; height: 24px; }
    .reticle-br::after  { bottom: 0; right: 0; width: 24px; height: 2px; }

    /* Scan line animation */
    .hero-scanline {
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--red), transparent);
      opacity: 0.15;
      animation: scanline 6s linear infinite;
    }

    @keyframes scanline {
      0%   { top: 68px; opacity: 0; }
      5%   { opacity: 0.15; }
      95%  { opacity: 0.15; }
      100% { top: 100%; opacity: 0; }
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
      width: 100%;
      padding: 80px 0;
    }

    .hero-left {}

    .hero-label {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
      animation: fadeUp 0.8s ease both;
    }

    .hero-label-text {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .hero-label-line {
      width: 40px;
      height: 1px;
      background: var(--blue);
    }

    .hero-title {
      font-family: var(--display);
      font-size: clamp(34px, 4vw, 58px);
      line-height: 1.1;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 28px;
      animation: fadeUp 0.8s 0.1s ease both;
    }

    .hero-title .accent {
      color: var(--blue);
      display: block;
    }

    .hero-title .thin {
      font-style: normal;
      font-size: 0.58em;
      display: block;
      color: var(--grey-light);
      letter-spacing: 0.16em;
    }

    .hero-subtitle {
      font-size: 16px;
      line-height: 1.65;
      color: var(--grey-mid);
      max-width: 480px;
      margin-bottom: 44px;
      font-weight: 400;
      animation: fadeUp 0.8s 0.2s ease both;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      animation: fadeUp 0.8s 0.3s ease both;
    }

    .hero-meta {
      display: flex;
      gap: 32px;
      margin-top: 56px;
      padding-top: 40px;
      border-top: 1px solid var(--border-strong);
      animation: fadeUp 0.8s 0.4s ease both;
    }

    .hero-stat {}

    .hero-stat-num {
      font-family: var(--display);
      font-size: 36px;
      line-height: 1;
      color: var(--black);
      letter-spacing: -0.02em;
    }

    .hero-stat-num span { color: var(--blue); }

    .hero-stat-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-light);
      margin-top: 6px;
    }

    /* Hero right: image + compact panels */
    .hero-right {
      display: flex;
      flex-direction: column;
      gap: 12px;
      animation: fadeLeft 0.9s 0.2s ease both;
    }

    /* ---- Image wrap ---- */
    .hero-image-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--grey-dark);
      overflow: hidden;
      clip-path: polygon(0 0, 100% 0, 100% 92%, 96% 100%, 0 100%);
    }

    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: contrast(1.05) saturate(0.9);
      transition: transform 6s ease;
    }

    .hero-image-wrap:hover .hero-image { transform: scale(1.04); }

    /* Scanbar sweep animation */
    .hero-image-scanbar {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, rgba(208,2,27,0.6), transparent);
      z-index: 4;
      pointer-events: none;
      animation: scanbar 4s linear infinite;
    }

    @keyframes scanbar {
      0%   { top: 0; opacity: 0; }
      5%   { opacity: 1; }
      95%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    /* Corner brackets */
    .hero-image-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      z-index: 5;
      pointer-events: none;
    }

    .hero-image-corner--tl { top: 12px; left: 12px; border-top: 2px solid var(--blue); border-left: 2px solid var(--blue); }
    .hero-image-corner--br { bottom: 20px; right: 12px; border-bottom: 2px solid var(--blue); border-right: 2px solid var(--blue); }

    /* Classification badge */
    .hero-image-badge {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 16px;
      background: linear-gradient(to top, rgba(0,0,0,0.75), transparent);
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      z-index: 3;
    }

    .badge-dot {
      width: 5px;
      height: 5px;
      background: var(--red);
      border-radius: 50%;
      flex-shrink: 0;
      animation: pulse-dot 2s ease-in-out infinite;
    }

    /* ---- Compact 3-panel row ---- */
    .hero-panels-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border-strong);
    }

    .hero-panel-sm {
      background: var(--white);
      padding: 16px 18px;
      position: relative;
      cursor: default;
      transition: background 0.2s;
    }

    .hero-panel-sm::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }

    .hero-panel-sm:hover { background: var(--off-white); }
    .hero-panel-sm:hover::before { transform: scaleX(1); }

    .panel-num {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--blue);
      letter-spacing: 0.1em;
      margin-bottom: 10px;
      opacity: 0.6;
    }

    .panel-title {
      font-family: var(--display);
      font-size: 18px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 6px;
    }

    .panel-desc {
      font-size: 13px;
      color: var(--grey-light);
      line-height: 1.5;
    }

    .panel-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .panel-tag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-mid);
      padding: 3px 8px;
      border: 1px solid var(--border-strong);
      background: var(--bg);
    }

    /* ===========================
       TICKER / MARQUEE
    =========================== */
    .ticker {
      background: var(--black);
      padding: 14px 0;
      overflow: hidden;
      position: relative;
      border-top: 2px solid var(--red);
    }

    .ticker-track {
      display: flex;
      gap: 0;
      animation: ticker 30s linear infinite;
      white-space: nowrap;
    }

    .ticker-item {
      display: inline-flex;
      align-items: center;
      gap: 20px;
      padding: 0 40px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-light);
    }

    .ticker-item .sep {
      width: 4px;
      height: 4px;
      background: var(--red);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ===========================
       ABOUT / MISSION
    =========================== */
    .section {
      padding: 120px 0;
    }

    .section-label {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
    }

    .section-label-text {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
    }

    .section-label-line {
      flex: 1;
      height: 1px;
      background: var(--border-strong);
    }

    .section-label-num {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--grey-pale);
    }

    .section-title {
      font-family: var(--display);
      font-size: clamp(28px, 3.2vw, 48px);
      line-height: 1.15;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--black);
    }

    .section-title .block { display: block; }
    .section-title .accent { color: var(--blue); }
    .section-title .light { color: var(--grey-light); }

    /* About */
    .about {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 100px;
      align-items: start;
    }

    .about-left {}

    .about-body {
      margin-top: 32px;
      font-size: 16px;
      line-height: 1.75;
      color: var(--grey-mid);
      max-width: 520px;
    }

    .about-body p + p { margin-top: 20px; }

    .about-cert {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      margin-top: 36px;
      padding: 16px 24px;
      border: 1px solid var(--border-strong);
      background: var(--bg);
    }

    .cert-icon {
      width: 40px;
      height: 40px;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-family: var(--mono);
      font-size: 8px;
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.3;
      flex-shrink: 0;
    }

    .cert-text {}
    .cert-text strong {
      display: block;
      font-family: var(--body);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .cert-text small {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      color: var(--grey-light);
      text-transform: uppercase;
    }

    .about-right {}

    .about-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-strong);
      margin-top: 48px;
    }

    .about-stat-box {
      background: var(--surface);
      padding: 32px 28px;
      position: relative;
      overflow: hidden;
    }

    .about-stat-box::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.4s ease;
    }

    .about-stat-box:hover::after { transform: scaleX(1); }

    .stat-num {
      font-family: var(--display);
      font-size: 52px;
      line-height: 1;
      color: var(--black);
      letter-spacing: -0.02em;
    }

    .stat-num .unit { color: var(--blue); font-size: 0.6em; }

    .stat-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--grey-light);
      margin-top: 10px;
    }

    .about-mission {
      margin-top: 0;
    }

    .mission-box {
      background: var(--blue);
      padding: 40px 36px;
      position: relative;
      overflow: hidden;
      clip-path: polygon(0 0, 100% 0, 100% 90%, 95% 100%, 0 100%);
    }

    .mission-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      width: 4px;
      background: var(--red);
    }

    .mission-box-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 20px;
    }

    .mission-text {
      font-family: var(--body);
      font-weight: 500;
      font-size: 22px;
      line-height: 1.4;
      color: var(--white);
      letter-spacing: 0.02em;
    }

    /* ===========================
       CAPABILITIES
    =========================== */
    .capabilities {
      background: var(--bg);
    }

    .cap-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 64px;
    }

    .cap-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border-strong);
    }

    .cap-card {
      background: var(--surface);
      padding: 44px 36px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: background 0.3s;
    }

    .cap-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: var(--blue);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.35s ease;
    }

    .cap-card:hover { background: var(--off-white); }
    .cap-card:hover::before { transform: scaleX(1); }

    .cap-card-num {
      font-family: var(--mono);
      font-size: 32px;
      color: var(--border-strong);
      line-height: 1;
      margin-bottom: 28px;
      letter-spacing: -0.02em;
      transition: color 0.3s;
    }

    .cap-card:hover .cap-card-num { color: var(--blue); opacity: 0.3; }

    .cap-card-icon {
      width: 48px;
      height: 48px;
      margin-bottom: 20px;
      position: relative;
    }

    .cap-icon-svg {
      width: 100%;
      height: 100%;
      stroke: var(--black);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: square;
      transition: stroke 0.3s;
    }

    .cap-card:hover .cap-icon-svg { stroke: var(--blue); }

    .cap-card-title {
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 14px;
      line-height: 1.2;
    }

    .cap-card-desc {
      font-size: 14px;
      line-height: 1.65;
      color: var(--grey-mid);
    }

    .cap-card-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
      transition: color 0.2s;
    }

    .cap-card:hover .cap-card-link { color: var(--blue); }

    .cap-card-link::after {
      content: '→';
      transition: transform 0.2s;
    }

    .cap-card:hover .cap-card-link::after { transform: translateX(4px); }

    /* ===========================
       GLOBAL REACH
    =========================== */
    .global {
      background: #001F45;
      color: var(--white);
      position: relative;
      overflow: hidden;
    }

    .global-bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    .global-red-stripe {
      position: absolute;
      top: 0;
      right: 200px;
      bottom: 0;
      width: 2px;
      background: var(--red);
      opacity: 0.15;
    }

    .global-content {
      position: relative;
      z-index: 2;
    }

    .global-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 100px;
      align-items: center;
    }

    .global-title { color: var(--white); }
    .global-title .light { color: rgba(255,255,255,0.4); }

    .global-body {
      margin-top: 28px;
      font-size: 15px;
      line-height: 1.75;
      color: var(--grey-light);
    }

    .global-regions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: rgba(255,255,255,0.06);
      margin-top: 44px;
    }

    .region-item {
      background: var(--grey-deep);
      padding: 18px 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.2s;
    }

    .region-item:hover { background: rgba(0,75,147,0.12); }

    .region-dot {
      width: 6px;
      height: 6px;
      background: var(--blue);
      flex-shrink: 0;
    }

    .region-name {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-pale);
    }

    /* World map placeholder */
    .global-map {
      position: relative;
    }

    .map-frame {
      aspect-ratio: 16/10;
      background: #0d1117;
      border: 1px solid rgba(255,255,255,0.08);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .map-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .map-svg {
      width: 100%;
      height: 100%;
      position: absolute;
      inset: 0;
      object-fit: cover;
      object-position: center;
      filter: brightness(0) invert(1) opacity(0.15);
    }

    .map-dots-layer {
      position: absolute;
      inset: 0;
    }

    .map-dot {
      position: absolute;
      width: 8px;
      height: 8px;
      border: 2px solid var(--red);
      border-radius: 50%;
      animation: map-pulse 2.5s ease-in-out infinite;
    }

    .map-dot::after {
      content: '';
      position: absolute;
      inset: -4px;
      border: 1px solid var(--red);
      border-radius: 50%;
      animation: map-ring 2.5s ease-in-out infinite;
    }

    @keyframes map-pulse {
      0%, 100% { background: var(--red); }
      50% { background: transparent; }
    }

    @keyframes map-ring {
      0% { transform: scale(1); opacity: 0.8; }
      100% { transform: scale(2.5); opacity: 0; }
    }

    /* Staggered delays */
    .map-dot:nth-child(2) { animation-delay: 0.4s; }
    .map-dot:nth-child(2)::after { animation-delay: 0.4s; }
    .map-dot:nth-child(3) { animation-delay: 0.8s; }
    .map-dot:nth-child(3)::after { animation-delay: 0.8s; }
    .map-dot:nth-child(4) { animation-delay: 1.2s; }
    .map-dot:nth-child(4)::after { animation-delay: 1.2s; }
    .map-dot:nth-child(5) { animation-delay: 1.6s; }
    .map-dot:nth-child(5)::after { animation-delay: 1.6s; }
    .map-dot:nth-child(6) { animation-delay: 2.0s; }
    .map-dot:nth-child(6)::after { animation-delay: 2.0s; }

    .map-label {
      position: absolute;
      bottom: 16px;
      left: 16px;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
    }

    /* ===========================
       SERVICES / CNC
    =========================== */
    .services {
      background: var(--surface);
    }

    .services-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 1px;
      background: var(--border-strong);
      margin-top: 64px;
    }

    .svc-card {
      background: var(--surface);
      padding: 44px 36px;
      position: relative;
    }

    .svc-card-featured {
      background: #001F45;
      color: var(--white);
    }

    .svc-card-featured .svc-title { color: var(--white); }
    .svc-card-featured .svc-desc { color: var(--grey-light); }

    .svc-num {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 32px;
    }

    .svc-title {
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--black);
      margin-bottom: 16px;
      line-height: 1.3;
    }

    .svc-desc {
      font-size: 14px;
      line-height: 1.7;
      color: var(--grey-mid);
    }

    .svc-specs {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .svc-spec {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--grey-light);
    }

    .svc-spec::before {
      content: '';
      width: 14px;
      height: 1px;
      background: var(--blue);
      flex-shrink: 0;
    }

    /* ===========================
       CTA BANNER
    =========================== */
    .cta-section {
      background: var(--blue);
      padding: 100px 0;
      position: relative;
      overflow: hidden;
    }

    .cta-bg {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .cta-stripe {
      position: absolute;
      top: 0;
      bottom: 0;
      right: 0;
      width: 320px;
      background: rgba(0,0,0,0.15);
      clip-path: polygon(20% 0, 100% 0, 100% 100%, 0% 100%);
    }

    .cta-content {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 40px;
    }

    .cta-text {}

    .cta-title {
      font-family: var(--display);
      font-size: clamp(26px, 3vw, 46px);
      line-height: 1.2;
      text-transform: uppercase;
      color: #fff;
      letter-spacing: 0.07em;
    }

    .cta-sub {
      margin-top: 16px;
      font-size: 15px;
      color: rgba(255,255,255,0.75);
      max-width: 420px;
    }

    .btn-white {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #fff;
      color: var(--blue);
      font-family: var(--body);
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 16px 36px;
      border: none;
      cursor: pointer;
      clip-path: polygon(0 0, 100% 0, 100% 75%, 92% 100%, 0 100%);
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-white:hover {
      background: var(--black);
      color: #fff;
    }

    .btn-outline-white {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: transparent;
      color: #fff;
      font-family: var(--display);
      font-size: 14px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 15px 36px;
      border: 1.5px solid rgba(255,255,255,0.5);
      cursor: pointer;
      clip-path: polygon(0 0, 100% 0, 100% 75%, 92% 100%, 0 100%);
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-outline-white:hover {
      background: rgba(255,255,255,0.15);
      border-color: #fff;
    }

    .cta-btns {
      display: flex;
      gap: 14px;
      flex-shrink: 0;
    }

    /* ===========================
       CONTACT
    =========================== */
    .contact {
      background: var(--bg);
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border-strong);
      margin-top: 64px;
    }

    .contact-info {
      background: var(--surface);
      padding: 56px 52px;
    }

    .contact-form-wrap {
      background: var(--surface);
      padding: 56px 52px;
    }

    .info-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 12px;
    }

    .info-value {
      font-family: var(--display);
      font-size: 16px;
      letter-spacing: 0.02em;
      color: var(--black);
      line-height: 1.5;
    }

    .info-group + .info-group { margin-top: 36px; }

    .info-divider {
      width: 40px;
      height: 2px;
      background: var(--blue);
      margin-bottom: 40px;
    }

    .form-row + .form-row { margin-top: 20px; }

    .form-row.two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form-group { display: flex; flex-direction: column; gap: 8px; }

    .form-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey-mid);
    }

    .form-input,
    .form-select,
    .form-textarea {
      background: var(--bg);
      border: 1px solid var(--border-strong);
      color: var(--black);
      font-family: var(--body);
      font-size: 14px;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-input::placeholder,
    .form-textarea::placeholder { color: var(--grey-pale); }

    .form-input:focus,
    .form-select:focus,
    .form-textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,75,147,0.08);
    }

    .form-textarea {
      height: 120px;
      resize: vertical;
    }

    .form-submit { margin-top: 28px; }

    /* ===========================
       FOOTER
    =========================== */
    .footer {
      background: #001530;
      color: var(--white);
      padding: 80px 0 0;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr;
      gap: 60px;
      padding-bottom: 60px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .footer-brand {}

    .footer-logo-name {
      font-family: var(--display);
      font-size: 24px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--white);
    }

    .footer-logo-sub {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue);
      margin-top: 4px;
    }

    .footer-tagline {
      margin-top: 20px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--grey-light);
      max-width: 280px;
    }

    .footer-cert-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 24px;
      padding: 10px 16px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
    }

    .footer-cert-icon {
      width: 28px;
      height: 28px;
      background: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--mono);
      font-size: 6px;
      letter-spacing: 0.05em;
      text-align: center;
      line-height: 1.3;
      color: #fff;
    }

    .footer-cert-text {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--grey-pale);
      line-height: 1.4;
    }

    .footer-col-title {
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--grey-light);
      margin-bottom: 20px;
    }

    .footer-links {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .footer-links a {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      transition: color 0.2s;
      letter-spacing: 0.02em;
    }

    .footer-links a:hover { color: var(--white); }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px 0;
    }

    .footer-copy {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.25);
      text-transform: uppercase;
    }

    .footer-flags {
      display: flex;
      gap: 16px;
    }

    .footer-flag {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.2);
      padding: 4px 10px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    /* ===========================
       ANIMATIONS
    =========================== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(24px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Scroll-triggered reveal */
    .reveal {
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .reveal-delay-1 { transition-delay: 0.1s; }
    .reveal-delay-2 { transition-delay: 0.2s; }
    .reveal-delay-3 { transition-delay: 0.3s; }
    .reveal-delay-4 { transition-delay: 0.4s; }

    /* ===========================
       HAMBURGER (mobile hint)
    =========================== */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 8px;
    }

    .nav-hamburger span {
      display: block;
      width: 24px;
      height: 2px;
      background: var(--black);
    }

    .nav-hamburger span:first-child { width: 16px; }

    /* ===========================
       RESPONSIVE
    =========================== */
    @media (max-width: 1100px) {
      .container { padding: 0 28px; }
      .hero-content { gap: 48px; }
      .cap-grid { grid-template-columns: 1fr 1fr; }
      .services-grid { grid-template-columns: 1fr 1fr; }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 40px; }
    }

    @media (max-width: 860px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
